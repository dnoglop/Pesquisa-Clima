<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consistem BI - Pesquisa de Clima</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #049C7A;
            --secondary: #312D31;
            --tertiary: #E84F3D;
            --accent: #F27D26;
            --background: #F5F5F5;
            --surface: #FFFFFF;
            --on-surface: #1A181A;
            --outline-variant: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--on-surface);
            overflow-x: hidden;
        }

        .font-sora { font-family: 'Sora', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        /* Recharts Overrides */
        .recharts-default-tooltip {
            background-color: #1A181A !important;
            border: none !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3) !important;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#049C7A',
                        secondary: '#6B6B6B',
                        tertiary: '#E84F3D',
                        accent: '#F27D26',
                        background: '#F5F5F5',
                        surface: '#FFFFFF',
                        'surface-low': '#FAFAFA',
                        'on-surface': '#1A181A',
                        'outline-variant': 'rgba(0, 0, 0, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        sora: ['Sora', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

    <script type="text/babel">
        // Wait for libraries to be available
        const { useState, useEffect, useMemo, useRef } = React;

        // Safely get Recharts components
        const RechartsSafe = typeof Recharts !== 'undefined' ? Recharts : {
            ResponsiveContainer: ({children}) => <div>{children}</div>, 
            PieChart: () => null, Pie: () => null, Cell: () => null, 
            BarChart: () => null, Bar: () => null, XAxis: () => null, YAxis: () => null, CartesianGrid: () => null, 
            Tooltip: () => null, Legend: () => null, Radar: () => null, RadarChart: () => null, 
            PolarGrid: () => null, PolarAngleAxis: () => null, PolarRadiusAxis: () => null 
        };

        const { 
            ResponsiveContainer, PieChart, Pie, Cell, 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, 
            Tooltip: RechartsTooltip, Legend, Radar, RadarChart, 
            PolarGrid, PolarAngleAxis, PolarRadiusAxis 
        } = RechartsSafe;

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && typeof lucide !== 'undefined') {
                    iconRef.current.innerHTML = '';
                    const iconData = lucide.icons[name];
                    if (iconData) {
                        const svg = lucide.createIcons({
                            icons: { [name]: iconData },
                            nameAttr: 'data-lucide'
                        });
                        // Simple way to render lucide in React without lucide-react
                        const svgElement = lucide.icons[name].toSvg({
                            class: className,
                            width: 20,
                            height: 20
                        });
                        iconRef.current.innerHTML = svgElement;
                    }
                }
            }, [name, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        // --- Data Processing Logic ---

        function processData(rawData) {
            if (!rawData || !Array.isArray(rawData) || rawData.length < 2) return [];
            
            const headers = rawData[0].map(h => String(h).trim());
            const rows = rawData.slice(1);

            return rows.map(row => {
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index];
                });

                return {
                    submissionId: obj['Submission ID'] || '',
                    respondentId: obj['Respondent ID'] || '',
                    submittedAt: obj['Submitted at'] || '',
                    area: obj['Em qual grupo de área você atua hoje?'] || 'N/A',
                    hobbies: obj['Quais são os seus hobbies no tempo livre? (selecione até 3)'] || '',
                    exercise: obj['Pratica exercício físico?'] || '',
                    infoSource: obj['Onde se informa mais sobre as notícias do dia?'] || '',
                    iaFrequency: obj['Com que frequência utiliza ferramentas de IA (como Gemini) no seu dia a dia?'] || '',
                    personality: obj['Se a nossa empresa fosse uma pessoa, quais adjetivos melhor a descreveriam? (selecione até 3)'] || '',
                    valuePerception: obj['Qual destas frases melhor define o que fazemos aqui hoje?'] || '',
                    pillarsIdentification: parseInt(obj['Conheço, entendo e identifico-me com os pilares da Consistem (Relacionamento, comprometimento, qualidade, evolução e transparência)']) || 0,
                    culturalSync: parseInt(obj['O que comunicamos (nos nossos canais) aos clientes externamente é exatamente o que vivemos aqui dentro.']) || 0,
                    testimonial: obj['Se um amigo te perguntasse "Como é trabalhar aí?", o que você diria honestamente nos primeiros 10 segundos?'] || '',
                    managerExample: parseInt(obj['O meu gestor direto age como um exemplo prático da cultura e dos valores da Consistem.']) || 0,
                    leadershipAmbassador: obj['Você sente que as lideranças (como um todo) atuam como embaixadoras da marca ou como crítica da marca diante das equipes?'] || '',
                    psychologicalSafety: parseInt(obj['Sinto segurança na minha equipe para dar opiniões, propor ideias e inovar.']) || 0,
                    safeSpaceForErrors: parseInt(obj['O quanto você sente que temos "espaço seguro" para admitir erros sem que isso vire um julgamento pessoal?']) || 0,
                    enps: parseInt(obj['De 0 a 10, o quanto você recomendaria a Consistem como um excelente lugar para se trabalhar a um amigo ou familiar?']) || 0,
                    recognitionFeeling: parseInt(obj['Sinto que o meu trabalho e o meu esforço diário são reconhecidos e valorizados pela empresa.']) || 0,
                    recognitionTypes: obj['Que formas de reconhecimento prefere? (Selecione até 2)'] || '',
                    elogioCanal: obj['Gostaria de ter um canal oficial e aberto para elogiar e agradecer publicamente aos colegas de trabalho que me ajudam.'] || '',
                    legacy: parseInt(obj['Eu me sinto motivado(a) a documentar e partilhar os meus conhecimentos e processos com o restante da empresa para deixar um legado.']) || 0,
                    mentorship: obj['Teria muito interesse em participar num programa estruturado de Mentoria (seja para aprender com os mais experientes ou para ensinar).'] || '',
                    priorityActions: obj['Pensando no que faria mais diferença positiva no seu dia a dia hoje, quais destas ações gostaria de ver a Consistem a lançar primeiro?'] || '',
                    communicationChange: obj['O que você mudaria hoje na nossa comunicação para que ela parecesse mais "a nossa cara"?'] || '',
                    vision40Years: obj['Pensando na nossa marca de 40 anos, o que você acredita que a Consistem precisa começar a fazer HOJE para ser uma empresa ainda melhor nas próximas décadas?'] || '',
                };
            });
        }

        function parseDate(dateVal) {
            if (!dateVal) return null;
            if (dateVal instanceof Date) return dateVal;
            
            const dateStr = String(dateVal);
            // Handle DD/MM/YYYY
            if (dateStr.includes('/')) {
                const [day, month, year] = dateStr.split('/');
                return new Date(year, month - 1, day);
            }
            // Handle YYYY-MM-DD
            if (dateStr.includes('-')) {
                return new Date(dateStr);
            }
            return new Date(dateStr);
        }

        function processStats(data, selectedArea = 'Todas', startDate, endDate) {
            let filteredData = selectedArea === 'Todas' ? data : data.filter(d => d.area === selectedArea);
            
            if (startDate) {
                const start = new Date(startDate);
                filteredData = filteredData.filter(d => {
                    const date = parseDate(d.submittedAt);
                    return date && date >= start;
                });
            }
            
            if (endDate) {
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999);
                filteredData = filteredData.filter(d => {
                    const date = parseDate(d.submittedAt);
                    return date && date <= end;
                });
            }

            const total = filteredData.length;
            const allAreas = Array.from(new Set(data.map(d => d.area)));

            if (total === 0) return null;

            const promoters = filteredData.filter(d => d.enps >= 9).length;
            const passives = filteredData.filter(d => d.enps >= 7 && d.enps <= 8).length;
            const detractors = filteredData.filter(d => d.enps <= 6).length;
            
            const enpsScore = ((promoters - detractors) / total) * 100;
            const enpsDistribution = {
                promoters: (promoters / total) * 100,
                passives: (passives / total) * 100,
                detractors: (detractors / total) * 100
            };

            const mentorshipInterest = (filteredData.filter(d => d.mentorship && d.mentorship.toLowerCase().includes('sim')).length / total) * 100;
            const iaUsageHigh = (filteredData.filter(d => d.iaFrequency && (d.iaFrequency.includes('Diariamente') || d.iaFrequency.includes('Algumas vezes'))).length / total) * 100;
            const legacyMotivation = filteredData.reduce((acc, curr) => acc + curr.legacy, 0) / total;

            const areaEngagement = allAreas.map(area => {
                const areaData = data.filter(d => d.area === area);
                const score = areaData.length > 0 ? areaData.reduce((acc, curr) => acc + curr.enps, 0) / areaData.length : 0;
                return { area, score };
            }).sort((a, b) => b.score - a.score);

            const areaDistribution = allAreas.map(area => {
                const areaData = data.filter(d => d.area === area);
                return { area, percentage: (areaData.length / data.length) * 100 };
            }).sort((a, b) => b.percentage - a.percentage);

            const iaUsageByArea = allAreas.map(area => {
                const areaData = data.filter(d => d.area === area);
                const highUsage = areaData.filter(d => d.iaFrequency && (d.iaFrequency.includes('Diariamente') || d.iaFrequency.includes('Algumas vezes'))).length;
                return { area, percentage: areaData.length > 0 ? (highUsage / areaData.length) * 100 : 0 };
            }).sort((a, b) => b.percentage - a.percentage);

            const recognitionScore = filteredData.reduce((acc, curr) => acc + curr.recognitionFeeling, 0) / total;
            const identificationScore = filteredData.reduce((acc, curr) => acc + curr.pillarsIdentification, 0) / total;
            const leadershipScore = filteredData.reduce((acc, curr) => acc + curr.managerExample, 0) / total;
            const safetyScore = filteredData.reduce((acc, curr) => acc + curr.safeSpaceForErrors, 0) / total;
            const culturalSyncScore = filteredData.reduce((acc, curr) => acc + curr.culturalSync, 0) / total;
            const elogioInterest = (filteredData.filter(d => d.elogioCanal && d.elogioCanal.toLowerCase().includes('sim')).length / total) * 100;

            // Personality Traits
            const traitMap = {};
            filteredData.forEach(d => {
                const traits = d.personality.split(',').map(t => t.trim());
                traits.forEach(t => { if (t) traitMap[t] = (traitMap[t] || 0) + 1; });
            });
            const personalityTraits = Object.entries(traitMap)
                .map(([trait, count]) => ({ trait, percentage: (count / total) * 100 }))
                .sort((a, b) => b.percentage - a.percentage)
                .slice(0, 5);

            // Leadership Sentiment
            const leadMap = {};
            filteredData.forEach(d => {
                if (d.leadershipAmbassador) {
                    const label = d.leadershipAmbassador.split('(')[0].trim();
                    leadMap[label] = (leadMap[label] || 0) + 1;
                }
            });
            const leadershipSentiment = Object.entries(leadMap).map(([label, value]) => ({ label, value }));

            // Priority Actions
            const actionMap = {};
            filteredData.forEach(d => {
                const actions = d.priorityActions.split(',').map(a => a.trim());
                actions.forEach(a => { if (a) actionMap[a] = (actionMap[a] || 0) + 1; });
            });
            const priorityActions = Object.entries(actionMap)
                .map(([action, count]) => ({ action, count }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 5);

            // Info Sources
            const infoMap = {};
            filteredData.forEach(d => {
                if (d.infoSource) infoMap[d.infoSource] = (infoMap[d.infoSource] || 0) + 1;
            });
            const infoSources = Object.entries(infoMap)
                .map(([source, count]) => ({ source, count }))
                .sort((a, b) => b.count - a.count);

            const valuePerceptionMap = {};
            filteredData.forEach(d => {
                if (d.valuePerception) valuePerceptionMap[d.valuePerception] = (valuePerceptionMap[d.valuePerception] || 0) + 1;
            });
            const valuePerceptionRanking = Object.entries(valuePerceptionMap)
                .map(([phrase, count]) => ({ phrase, count }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 3);

            // Heatmap Data
            const heatmap = allAreas.map(area => {
                const areaData = data.filter(d => d.area === area);
                const aTotal = areaData.length;
                if (aTotal === 0) return { area, metrics: [] };

                const metrics = [
                    { label: 'Identificação', score: areaData.reduce((acc, curr) => acc + curr.pillarsIdentification, 0) / aTotal },
                    { label: 'Liderança', score: areaData.reduce((acc, curr) => acc + curr.managerExample, 0) / aTotal },
                    { label: 'Segurança', score: areaData.reduce((acc, curr) => acc + curr.psychologicalSafety, 0) / aTotal },
                    { label: 'Reconhecimento', score: areaData.reduce((acc, curr) => acc + curr.recognitionFeeling, 0) / aTotal },
                    { label: 'eNPS', score: areaData.reduce((acc, curr) => acc + curr.enps, 0) / aTotal },
                ];

                return {
                    area,
                    metrics: metrics.map(m => ({
                        ...m,
                        color: m.score >= 8.5 ? '#049C7A' : m.score >= 7 ? '#F27D26' : '#E84F3D'
                    }))
                };
            });

            // Comparisons Data
            const comparisons = allAreas.map(area => {
                const areaData = data.filter(d => d.area === area);
                const aTotal = areaData.length;
                
                const areaActionMap = {};
                areaData.forEach(d => {
                    const actions = d.priorityActions.split(',').map(a => a.trim());
                    actions.forEach(a => { if (a) areaActionMap[a] = (areaActionMap[a] || 0) + 1; });
                });
                const sortedActions = Object.entries(areaActionMap).sort((a, b) => b[1] - a[1]);
                const topAction = (sortedActions.length > 0 && sortedActions[0][0]) || 'N/A';

                const aPromoters = areaData.filter(d => d.enps >= 9).length;
                const aDetractors = areaData.filter(d => d.enps <= 6).length;
                const aEnpsScore = aTotal > 0 ? ((aPromoters - aDetractors) / aTotal) * 100 : 0;

                return {
                    area,
                    enps: aEnpsScore,
                    seguranca: aTotal > 0 ? areaData.reduce((acc, curr) => acc + curr.psychologicalSafety, 0) / aTotal : 0,
                    lideranca: aTotal > 0 ? areaData.reduce((acc, curr) => acc + curr.managerExample, 0) / aTotal : 0,
                    identificacao: aTotal > 0 ? areaData.reduce((acc, curr) => acc + curr.pillarsIdentification, 0) / aTotal : 0,
                    reconhecimento: aTotal > 0 ? areaData.reduce((acc, curr) => acc + curr.recognitionFeeling, 0) / aTotal : 0,
                    topPriorityAction: topAction,
                    iaUsage: aTotal > 0 ? (areaData.filter(d => d.iaFrequency && (d.iaFrequency.includes('Diariamente') || d.iaFrequency.includes('Algumas vezes'))).length / aTotal) * 100 : 0,
                    mentorshipInterest: aTotal > 0 ? (areaData.filter(d => d.mentorship && d.mentorship.toLowerCase().includes('sim')).length / aTotal) * 100 : 0,
                };
            });

            return {
                enpsScore,
                enpsDistribution,
                mentorshipInterest,
                iaUsageHigh,
                legacyMotivation,
                areaEngagement,
                areaDistribution,
                iaUsageByArea,
                recognitionScore,
                identificationScore,
                leadershipScore,
                safetyScore,
                culturalSyncScore,
                elogioInterest,
                personalityTraits,
                leadershipSentiment,
                priorityActions,
                infoSources,
                valuePerceptionRanking,
                communicationFeedback: filteredData.map(d => ({ area: d.area, text: d.communicationChange })),
                visionFeedback: filteredData.map(d => ({ area: d.area, text: d.vision40Years })),
                testimonials: filteredData.slice(0, 9).map(d => ({ text: d.testimonial, role: d.area })),
                areas: allAreas,
                heatmap,
                comparisons,
                totalResponses: total,
                habits: {
                    exercise: (filteredData.filter(d => d.exercise && d.exercise.toLowerCase().startsWith('sim')).length / total) * 100,
                }
            };
        }

        // --- UI Components ---

        const StatCard = ({ icon, label, value, subValue, highlight }) => (
            <div className={`p-6 rounded-3xl border transition-all group relative overflow-hidden ${highlight ? 'bg-tertiary border-tertiary shadow-xl text-white' : 'glass-card border-outline-variant/10 hover:border-primary/30'}`}>
                {highlight && <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl" />}
                <div className="flex items-center gap-4 mb-4 relative z-10">
                    <div className={`p-3 rounded-2xl transition-colors ${highlight ? 'bg-white/20' : 'bg-on-surface/5 group-hover:bg-primary/10'}`}>
                        <Icon name={icon} className={`w-5 h-5 ${highlight ? 'text-white' : 'text-primary'}`} />
                    </div>
                    <div className="flex-1">
                        <p className={`text-[10px] font-bold uppercase tracking-widest ${highlight ? 'text-white/90' : 'text-secondary'}`}>{label}</p>
                        <p className={`text-3xl font-black font-sora ${highlight ? 'text-white' : 'text-on-surface'}`}>{value}</p>
                    </div>
                </div>
                <p className={`text-[10px] relative z-10 ${highlight ? 'text-white/70' : 'text-secondary'}`}>{subValue}</p>
            </div>
        );

        // --- Main App Component ---

        function App() {
            const [rawData, setRawData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('geral');
            const [selectedArea, setSelectedArea] = useState('Todas');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            useEffect(() => {
                if (typeof google !== 'undefined') {
                    google.script.run
                        .withSuccessHandler((data) => {
                            if (typeof data === 'string' && data.startsWith('ERRO')) {
                                setError(data);
                            } else {
                                setRawData(data);
                            }
                            setLoading(false);
                        })
                        .withFailureHandler((err) => {
                            setError(err.message);
                            setLoading(false);
                        })
                        .getData();
                } else {
                    // Mock data for local testing
                    setError("Ambiente fora do Google Apps Script detectado.");
                    setLoading(false);
                }
            }, []);

            const surveyResponses = useMemo(() => processData(rawData), [rawData]);
            const stats = useMemo(() => processStats(surveyResponses, selectedArea, startDate, endDate), [surveyResponses, selectedArea, startDate, endDate]);

            if (loading) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-background">
                        <div className="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-secondary font-bold uppercase tracking-widest text-[10px]">Carregando Dashboard...</p>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-background p-8 text-center">
                        <div className="p-4 bg-tertiary/10 text-tertiary rounded-2xl mb-4">
                            <Icon name="AlertCircle" className="w-8 h-8 mx-auto mb-2" />
                            <p className="font-bold">Erro ao carregar dados</p>
                        </div>
                        <p className="text-secondary text-sm max-w-md">{error}</p>
                    </div>
                );
            }

            const menuItems = [
                { id: 'geral', label: 'Visão Geral', icon: 'LayoutDashboard' },
                { id: 'engajamento', label: 'Engajamento', icon: 'BarChart3' },
                { id: 'cultura', label: 'Cultura', icon: 'Users' },
                { id: 'comparativo', label: 'Comparativo', icon: 'GitCompare' },
                { id: 'heatmap', label: 'Mapa de Calor', icon: 'Flame' },
                { id: 'feedback', label: 'Voz do Time', icon: 'MessageSquare' },
            ];

            return (
                <div className="min-h-screen bg-background pb-12">
                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 h-20 z-40 bg-white/80 backdrop-blur-xl border-b border-outline-variant/10 flex items-center px-4 sm:px-8">
                        <div className="flex items-center justify-between w-full max-w-7xl mx-auto gap-4">
                            <div className="flex items-center shrink-0">
                                <span className="font-black text-xl tracking-tighter text-on-surface">CONSISTEM <span className="text-primary">BI</span></span>
                            </div>

                            <nav className="hidden md:flex items-center gap-1 bg-surface-low/50 p-1 rounded-2xl border border-outline-variant/10">
                                {menuItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`flex items-center gap-2 px-4 py-2 text-[10px] font-sora uppercase tracking-widest transition-all duration-300 rounded-xl whitespace-nowrap ${activeTab === item.id ? 'text-primary font-bold bg-white shadow-sm' : 'text-secondary hover:text-on-surface hover:bg-white/50'}`}
                                    >
                                        <Icon name={item.icon} className="w-4 h-4" />
                                        <span className="hidden lg:block">{item.label}</span>
                                    </button>
                                ))}
                            </nav>

                            <div className="flex items-center gap-3">
                                <select 
                                    value={selectedArea}
                                    onChange={(e) => setSelectedArea(e.target.value)}
                                    className="bg-surface-low border border-outline-variant/10 rounded-xl px-4 py-2 text-[10px] font-bold focus:outline-none"
                                >
                                    <option value="Todas">Todas as Áreas</option>
                                    {stats.areas.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="pt-24 px-4 sm:px-8 max-w-7xl mx-auto">
                        {activeTab === 'geral' && <VisaoGeral stats={stats} />}
                        {activeTab === 'engajamento' && <Engajamento stats={stats} />}
                        {activeTab === 'cultura' && <Cultura stats={stats} />}
                        {activeTab === 'comparativo' && <Comparativo stats={stats} />}
                        {activeTab === 'heatmap' && <Heatmap stats={stats} />}
                        {activeTab === 'feedback' && <Feedback stats={stats} />}
                    </main>
                </div>
            );
        }

        // --- Tab Components ---

        function VisaoGeral({ stats }) {
            const enpsZone = stats.enpsScore >= 75 ? 'ZONA DE EXCELÊNCIA' : stats.enpsScore >= 50 ? 'ZONA DE QUALIDADE' : stats.enpsScore >= 0 ? 'ZONA DE APERFEIÇOAMENTO' : 'ZONA CRÍTICA';
            const enpsDistributionData = [
                { name: 'Promotores', value: stats.enpsDistribution.promoters, fill: '#049C7A' },
                { name: 'Passivos', value: stats.enpsDistribution.passives, fill: '#312D31' },
                { name: 'Detratores', value: stats.enpsDistribution.detractors, fill: '#E84F3D' }
            ];

            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard icon="Target" label="Identificação" value={stats.identificationScore.toFixed(1)} subValue="Com os pilares" />
                        <StatCard icon="Users" label="Liderança" value={stats.leadershipScore.toFixed(1)} subValue="Como embaixadora" />
                        <StatCard icon="Shield" label="Segurança" value={stats.safetyScore.toFixed(1)} subValue="Espaço para erro" />
                        <StatCard icon="CheckCircle" label="Respostas" value={stats.totalResponses.toString()} subValue="Total de envios" highlight />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Distribuição eNPS</h3>
                            <div className="h-48 relative">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie data={enpsDistributionData} cx="50%" cy="50%" innerRadius={50} outerRadius={70} paddingAngle={5} dataKey="value" stroke="none">
                                            {enpsDistributionData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.fill} />)}
                                        </Pie>
                                        <RechartsTooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                    <span className="text-4xl font-black">{stats.enpsScore.toFixed(0)}</span>
                                    <span className="text-[10px] font-bold text-secondary uppercase tracking-widest mt-1">Score eNPS</span>
                                </div>
                            </div>
                        </div>

                        <div className="glass-card p-8 rounded-3xl bg-[#1A181A] text-white">
                            <h3 className="text-lg font-bold mb-6 text-center">NPS Total</h3>
                            <div className="h-48 relative flex items-center justify-center">
                                <div className="text-center">
                                    <span className="text-6xl font-black block">{stats.enpsScore.toFixed(0)}</span>
                                    <span className="text-[10px] font-bold text-tertiary uppercase tracking-widest mt-2">{enpsZone}</span>
                                </div>
                            </div>
                        </div>

                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Distribuição por Área</h3>
                            <div className="space-y-4">
                                {stats.areaDistribution.slice(0, 5).map((area) => (
                                    <div key={area.area} className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold">
                                            <span className="truncate max-w-[150px]">{area.area}</span>
                                            <span>{area.percentage.toFixed(0)}%</span>
                                        </div>
                                        <div className="h-1.5 bg-on-surface/5 rounded-full overflow-hidden">
                                            <div className="h-full bg-primary" style={{ width: `${area.percentage}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Engajamento({ stats }) {
            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard icon="TrendingUp" label="eNPS Geral" value={stats.enpsScore.toFixed(1)} subValue="Média de recomendação" />
                        <StatCard icon="Heart" label="Bem-estar" value={`${stats.habits.exercise.toFixed(0)}%`} subValue="Praticam exercícios" />
                        <StatCard icon="GraduationCap" label="Mentoria" value={`${stats.mentorshipInterest.toFixed(0)}%`} subValue="Interesse em participar" />
                        <StatCard icon="History" label="Legado" value={stats.legacyMotivation.toFixed(1)} subValue="Motivação em partilhar" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Engajamento IA por Área</h3>
                            <div className="space-y-4">
                                {stats.iaUsageByArea.slice(0, 6).map((area) => (
                                    <div key={area.area} className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold uppercase tracking-wider">
                                            <span className="truncate max-w-[150px]">{area.area}</span>
                                            <span className="text-primary">{area.percentage.toFixed(0)}%</span>
                                        </div>
                                        <div className="h-1.5 bg-on-surface/5 rounded-full overflow-hidden">
                                            <div className="h-full bg-primary" style={{ width: `${area.percentage}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Prioridades do Time</h3>
                            <div className="space-y-3">
                                {stats.priorityActions.map((action, index) => (
                                    <div key={index} className="flex items-center gap-3 p-3 rounded-xl bg-on-surface/5 border border-outline-variant/10">
                                        <div className="w-6 h-6 rounded-full bg-accent text-white flex items-center justify-center shrink-0 text-[10px] font-bold">{index + 1}</div>
                                        <p className="text-[11px] font-bold leading-tight">{action.action}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Reconhecimento</h3>
                            <div className="text-center py-8 bg-tertiary/5 rounded-2xl mb-6">
                                <span className="text-5xl font-black text-tertiary">{stats.recognitionScore.toFixed(1)}</span>
                                <p className="text-[10px] font-bold text-secondary uppercase mt-2">Média de Valorização</p>
                            </div>
                            <p className="text-xs text-secondary text-center italic">"Sinto que meu trabalho é valorizado pela empresa"</p>
                        </div>
                    </div>
                </div>
            );
        }

        function Cultura({ stats }) {
            const COLORS = ['#049C7A', '#312D31', '#E84F3D', '#F27D26'];
            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Percepção da Liderança</h3>
                            <div className="h-64 relative">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie data={stats.leadershipSentiment} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value" nameKey="label" stroke="none">
                                            {stats.leadershipSentiment.map((entry, index) => <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />)}
                                        </Pie>
                                        <RechartsTooltip />
                                        <Legend />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Segurança Psicológica</h3>
                            <div className="space-y-6">
                                <div className="p-6 rounded-2xl bg-on-surface/5 border border-outline-variant/10">
                                    <p className="text-sm font-bold mb-2">Espaço Seguro para Erros</p>
                                    <div className="flex items-center gap-4">
                                        <div className="flex-1 h-2 bg-on-surface/10 rounded-full overflow-hidden">
                                            <div className="h-full bg-primary" style={{ width: `${(stats.safetyScore / 5) * 100}%` }}></div>
                                        </div>
                                        <span className="text-sm font-bold">{stats.safetyScore.toFixed(1)}/5</span>
                                    </div>
                                </div>
                                <div className="p-6 rounded-2xl bg-on-surface/5 border border-outline-variant/10">
                                    <p className="text-sm font-bold mb-2">Sincronia Cultural</p>
                                    <div className="flex items-center gap-4">
                                        <div className="flex-1 h-2 bg-on-surface/10 rounded-full overflow-hidden">
                                            <div className="h-full bg-primary" style={{ width: `${(stats.culturalSyncScore / 5) * 100}%` }}></div>
                                        </div>
                                        <span className="text-sm font-bold">{stats.culturalSyncScore.toFixed(1)}/5</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Personalidade</h3>
                            <div className="flex flex-wrap gap-2">
                                {stats.personalityTraits.map((trait, index) => (
                                    <div key={index} className={`px-4 py-2 rounded-2xl text-[10px] font-bold ${index === 0 ? 'bg-primary text-white' : 'bg-on-surface/5 text-secondary border border-outline-variant/10'}`}>
                                        {trait.trait} ({trait.percentage.toFixed(0)}%)
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="lg:col-span-2 glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Percepção de Valor (Propósito)</h3>
                            <div className="space-y-4">
                                {stats.valuePerceptionRanking.map((item, index) => (
                                    <div key={index} className="flex items-center gap-4 p-4 rounded-2xl bg-on-surface/5 border border-outline-variant/10">
                                        <div className="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-black text-sm shrink-0">{index + 1}</div>
                                        <div className="flex-1">
                                            <p className="text-xs font-bold leading-tight">"{item.phrase}"</p>
                                            <div className="mt-2 h-1.5 bg-on-surface/10 rounded-full overflow-hidden w-full">
                                                <div className="h-full bg-primary" style={{ width: `${(item.count / stats.totalResponses) * 100}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Comparativo({ stats }) {
            const [selectedAreas, setSelectedAreas] = useState([stats.areas[0], stats.areas[1]].filter(Boolean));
            const comparisonData = useMemo(() => {
                const metrics = ['enps', 'seguranca', 'lideranca', 'identificacao', 'reconhecimento', 'iaUsage'];
                return metrics.map(metric => {
                    const obj = { metric: metric.charAt(0).toUpperCase() + metric.slice(1) };
                    selectedAreas.forEach(area => {
                        const areaStats = stats.comparisons.find(c => c.area === area);
                        if (areaStats) {
                            let val = areaStats[metric];
                            if (metric === 'enps') val = (val + 100) / 20; // Normalize -100..100 to 0..10
                            obj[area] = val;
                        }
                    });
                    return obj;
                });
            }, [stats.comparisons, selectedAreas]);

            return (
                <div className="space-y-8">
                    <div className="glass-card p-8 rounded-3xl">
                        <div className="flex justify-between items-center mb-8">
                            <h3 className="text-lg font-bold">Comparativo entre Áreas</h3>
                            <div className="flex gap-2">
                                {stats.areas.map(area => (
                                    <button 
                                        key={area}
                                        onClick={() => {
                                            if (selectedAreas.includes(area)) setSelectedAreas(selectedAreas.filter(a => a !== area));
                                            else if (selectedAreas.length < 3) setSelectedAreas([...selectedAreas, area]);
                                        }}
                                        className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${selectedAreas.includes(area) ? 'bg-primary text-white' : 'bg-on-surface/5 text-secondary'}`}
                                    >
                                        {area}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="h-[400px]">
                            <ResponsiveContainer width="100%" height="100%">
                                <RadarChart cx="50%" cy="50%" outerRadius="80%" data={comparisonData}>
                                    <PolarGrid stroke="rgba(0,0,0,0.1)" />
                                    <PolarAngleAxis dataKey="metric" tick={{ fontSize: 10, fontWeight: 700 }} />
                                    <PolarRadiusAxis angle={30} domain={[0, 10]} tick={false} axisLine={false} />
                                    {selectedAreas.map((area, i) => (
                                        <Radar key={area} name={area} dataKey={area} stroke={['#049C7A', '#E84F3D', '#F27D26'][i]} fill={['#049C7A', '#E84F3D', '#F27D26'][i]} fillOpacity={0.3} />
                                    ))}
                                    <Legend />
                                </RadarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        }

        function Heatmap({ stats }) {
            return (
                <div className="glass-card p-8 rounded-3xl overflow-x-auto">
                    <h3 className="text-lg font-bold mb-8">Mapa de Calor por Área</h3>
                    <table className="w-full min-w-[800px]">
                        <thead>
                            <tr>
                                <th className="text-left p-4 text-[10px] font-black uppercase tracking-widest text-secondary">Área</th>
                                {['Identificação', 'Liderança', 'Segurança', 'Reconhecimento', 'eNPS'].map(m => (
                                    <th key={m} className="p-4 text-[10px] font-black uppercase tracking-widest text-secondary text-center">{m}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {stats.heatmap.map((row) => (
                                <tr key={row.area} className="border-t border-outline-variant/5">
                                    <td className="p-4 font-bold text-xs">{row.area}</td>
                                    {row.metrics.map((m, i) => (
                                        <td key={i} className="p-2">
                                            <div className="h-12 rounded-xl flex items-center justify-center text-white font-black text-xs shadow-sm" style={{ backgroundColor: m.color }}>
                                                {m.score.toFixed(1)}
                                            </div>
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function Feedback({ stats }) {
            const [selectedArea, setSelectedArea] = useState('Todas');
            const filteredTestimonials = selectedArea === 'Todas' ? stats.testimonials : stats.testimonials.filter(t => t.role === selectedArea);
            const filteredComm = selectedArea === 'Todas' ? stats.communicationFeedback : stats.communicationFeedback.filter(f => f.area === selectedArea);
            const filteredVision = selectedArea === 'Todas' ? stats.visionFeedback : stats.visionFeedback.filter(f => f.area === selectedArea);

            return (
                <div className="space-y-8">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-black tracking-tight">Voz do Time</h2>
                        <select 
                            value={selectedArea}
                            onChange={(e) => setSelectedArea(e.target.value)}
                            className="bg-surface-low border border-outline-variant/10 rounded-xl px-4 py-2 text-[10px] font-bold focus:outline-none"
                        >
                            <option value="Todas">Todas as Áreas</option>
                            {stats.areas.map(a => <option key={a} value={a}>{a}</option>)}
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredTestimonials.map((t, i) => (
                            <div key={i} className="glass-card p-6 rounded-3xl relative">
                                <Icon name="Quote" className="w-8 h-8 text-primary/10 absolute top-4 left-4" />
                                <p className="text-sm italic leading-relaxed mb-4 relative z-10">"{t.text}"</p>
                                <div className="pt-4 border-t border-outline-variant/10">
                                    <span className="text-[9px] font-black uppercase tracking-widest text-primary">{t.role}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="glass-card p-8 rounded-3xl">
                            <h3 className="text-lg font-bold mb-6">Sugestões de Comunicação</h3>
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-4 custom-scrollbar">
                                {filteredComm.filter(f => f.text).map((f, i) => (
                                    <div key={i} className="p-4 bg-on-surface/5 rounded-xl border border-outline-variant/5">
                                        <span className="text-[9px] font-black text-tertiary uppercase block mb-1">{f.area}</span>
                                        <p className="text-xs">"{f.text}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="glass-card p-8 rounded-3xl bg-[#1A181A] text-white">
                            <h3 className="text-lg font-bold mb-6">Visão Consistem 40 Anos</h3>
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-4 custom-scrollbar">
                                {filteredVision.filter(f => f.text).map((f, i) => (
                                    <div key={i} className="p-4 bg-white/5 rounded-xl border border-white/10">
                                        <span className="text-[9px] font-black text-secondary uppercase block mb-1">{f.area}</span>
                                        <p className="text-xs">"{f.text}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
